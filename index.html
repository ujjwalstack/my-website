<!DOCTYPE html>
<html lang="en">
<head>
    <title>UjjwalCreativeSpace | Motivation & Quotes</title>

    <!-- SEO -->
    <meta charset="UTF-8">
    <meta name="description" content="Daily motivation quotes, success mindset tips, and inspiration to grow your life.">
    <meta name="keywords" content="motivation, quotes, success, mindset, inspiration">
    <meta name="author" content="UjjwalCreativeSpace">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: linear-gradient(to right, #ff0033, #ff4d6d);
            color: white;
            padding: 60px 20px;
            text-align: center;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            margin: 0;
            font-size: 32px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 85%;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            animation: slideUp 1s ease;
        }

        .button {
            display: inline-block;
            padding: 12px 22px;
            background: #e60023;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            background: #b8001c;
            transform: scale(1.08);
        }

        /* Image Grid */
        .image-grid {
            display: flex;
            justify-content: center;
        }

        .image-grid img {
            width: 300px;
            border-radius: 10px;
            transition: 0.4s;
        }

        .image-grid img:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Quote Box */
        #quoteText {
            font-size: 18px;
            text-align: center;
            min-height: 40px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>🔥 UjjwalCreativeSpace</h1>
    <p>Daily Motivation | Quotes | Success Mindset</p>
</header>

<div class="container">

    <!-- Pinterest -->
    <div class="card">
        <h2>📌 Follow Me on Pinterest</h2>
        <a class="button" href="https://pin.it/5M3c6E9Pp" target="_blank">
            Visit My Pinterest
        </a>
    </div>

    <!-- Single Image -->
    <div class="card">
        <h2>🔥 Motivation Highlight</h2>
        <div class="image-grid">
            <a href="https://pin.it/5M3c6E9Pp" target="_blank">
                <img src="img1.png" alt="Motivation Image">
            </a>
        </div>
    </div>

    <!-- Quote Generator -->
    <div class="card">
        <h2>⚡ Get Instant Motivation</h2>

        <p id="quoteText">
            Click below to get inspired 👇
        </p>

        <div style="text-align:center; margin-top:15px;">
            <button onclick="generateQuote()" class="button">
                Generate Quote
            </button>
        </div>
    </div>

</div>

<footer>
    <p>© 2026 UjjwalCreativeSpace | All Rights Reserved</p>
</footer>

<!-- SCRIPT -->
<script>
const quotes = [
    "Push beyond your limits.",
    "Success is built daily.",
    "Discipline beats motivation.",
    "Dream big. Start now.",
    "Stay consistent, results will come.",
    "Don't stop until you're proud.",
    "Small steps lead to big success.",
    "Believe in yourself.",
    "Make today count.",
    "You are stronger than you think."
];

function generateQuote() {
    let random = quotes[Math.floor(Math.random() * quotes.length)];
    typeEffect(random);
}

function typeEffect(text) {
    let i = 0;
    let speed = 40;
    let element = document.getElementById("quoteText");
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}
</script>

</body>
</html>
